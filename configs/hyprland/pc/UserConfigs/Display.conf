# Configurar DP-1 como monitor principal (posición 0x0)
monitor = DP-1,1920x1080@165,0x0,1

# Segundo monitor a la izquierda
monitor = DP-3,1920x1080@60,-1920x0,1

# Monitor Terciario (El  portatil)
# monitor = HDMI-A-1,1920x1080@60,1920x0,1,transform,1
# monitor = HDMI-A-1,1920x1080@60,0x1080,1,transform,2
monitor = HDMI-A-1,1920x1080@60,1920x0,1

# Vincular el workspace 1 al monitor DP-3
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-3
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 9, monitor:DP-3
workspace = 10, monitor:DP-3
workspace = 11, monitor:HDMI-A-1
workspace = 12, monitor:HDMI-A-1
workspace = 13, monitor:HDMI-A-1
workspace = 14, monitor:HDMI-A-1
workspace = 15, monitor:HDMI-A-1
